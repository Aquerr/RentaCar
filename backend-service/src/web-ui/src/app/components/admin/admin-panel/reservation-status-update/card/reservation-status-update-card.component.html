<div class='container'>
  <img alt='' [src]='reservation.vehicleIconUrl' />
  <div class='info'>
    {{reservation.vehicleName}}
  </div>
  <div class='date-container'>
    <div class='info'>{{'components.reservation-status-update-card.labels.dateFrom' | translate}} {{reservation.dateFrom}}</div>
    <div class='info'>{{'components.reservation-status-update-card.labels.dateTo' | translate}} {{reservation.dateTo}}</div>
  </div>
  <div class='info'>
    <app-select [model]="selectedStatus" [options]="getProperStatuses()"></app-select>
  </div>
  <app-button [label]="'components.reservation-status-update-card.buttons.changeStatus' | translate" (click)='changeStatusEmit()' [disabled]='reservation.status === selectedStatus || isNotAllowedChangeStatuses()'></app-button>
</div>
